framework:
    messenger:
        default_bus: chat.command.bus
        buses:
            chat.command.bus: ~
            chat.query.bus: ~

        transports:
            chat.sync: 'sync://'
            chat.async:
                dsn: "%env(REDIS_URL)%"
                options:
                    stream: messages

        routing:
            'App\Chat\Application\Query\GetChatMessages\GetChatMessagesQuery': chat.sync
            'App\Chat\Application\Command\SendMessage\SendMessageCommand': chat.sync
            'App\Chat\Domain\Event\SentMessageEvent': chat.async

