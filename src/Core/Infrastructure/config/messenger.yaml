framework:
    messenger:
#        default_bus: core.registration.command.bus
        buses:
            core.registration.command.bus:
            core.query.bus:
                # middleware:
                #     - validation
                #     - doctrine_transaction

        transports:
            sync: 'sync://'
            async:
                dsn: "%env(REDIS_URL)%"
                options:
                    stream: messages

        routing:
            ### sync
            'App\Core\Application\Command\RegisterUser\RegisterUserCommand': sync
            'App\Core\Application\Query\IsEmailTaken\IsEmailTakenQuery': sync
            'App\Core\Application\Event\UserWasRegistered\UserWasRegisteredEvent': sync
            ### async
            'App\Core\Application\Command\SendUserActivationMail\SendUserActivationMailCommand': async

