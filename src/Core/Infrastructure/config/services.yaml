services:
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    App\Messenger\Mercure\Chat\Application\Action\LoadChat\LoadChatAction: ~

    App\Messenger\Mercure\Chat\Application\Action\MessageChat\MessageChatAction: ~

    App\Messenger\Mercure\Chat\Domain\Service\PublisherInterface:
        class: App\Messenger\Mercure\Chat\Infrastructure\Service\Publisher

    App\Core\Domain\Service\Mailer\RegisteredUserActivationMailer\RegisteredUserActivationMailerInterface:
        alias: App\Core\Infrastructure\Mailer\RegisteredUserActivationMailer

    App\Core\Infrastructure\Mailer\RegisteredUserActivationMailer:
        arguments:
            $from: !service
                class: Symfony\Component\Mime\Address
                arguments:
                    $address: "no-reply@du.pa"
#                    $name: "Rejestracja"
