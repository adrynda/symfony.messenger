services:
  app:
#    container_name: symfony-messenger-php
    build:
      context: ../../
      dockerfile: _docker/dev/Dockerfile
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    restart: unless-stopped
    environment:
      DEFAULT_URI: "http://symfony-messenger.localhost"
      DATABASE_URL: "postgresql://app:app@database:5432/app?serverVersion=16&charset=utf8"
      MERCURE_URL: "http://mercure/.well-known/mercure"
      MERCURE_PUBLIC_URL: "http://symfony-messenger.localhost/.well-known/mercure"
      MERCURE_JWT_SECRET: '!ChangeThisMercureHubJWTSecretKey!'
      REDIS_URL: "redis://redis:6379"
      MESSENGER_TRANSPORT_DSN: "redis://redis:6379/messages"
      MAILER_DSN: "smtp://mailpit:1025"
    volumes:
      - ../..:/app
    healthcheck:
      test: [ "CMD-SHELL", "curl -so /dev/null http://localhost/ || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.symfony-messenger.rule=Host(`symfony-messenger.localhost`)
      - traefik.http.services.symfony-messenger.loadbalancer.server.port=80
      - traefik.docker.network=traefik
    networks:
      - internal
      - traefik

  database:
    image: postgres:16-alpine
#    container_name: symfony-messenger-db  # unique name for Adminer DNS resolution across projects
    restart: unless-stopped
    # TODO: replace port mapping with Traefik TCP TLS passthrough to avoid inter-project port conflicts.
    # Requires PostgreSQL SSL cert (ssl=on in postgresql.conf + server.crt/server.key) and
    # traefik.tcp.routers.*.tls.passthrough=true label — Traefik reads SNI and forwards raw bytes,
    # so PostgreSQL handles TLS itself. DBeaver connects to db.symfony-messenger.localhost:5432 with sslmode=require.
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "app", "-U", "app"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    networks:
      - internal

  mercure:
    image: dunglas/mercure
#    container_name: symfony-messenger-mercure
    restart: unless-stopped
    environment:
      MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins http://symfony-messenger.localhost
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.routers.symfony-messenger-mercure.rule=Host(`symfony-messenger.localhost`) && PathPrefix(`/.well-known/mercure`)
      - traefik.http.services.symfony-messenger-mercure.loadbalancer.server.port=80
      - traefik.docker.network=traefik
    networks:
      - internal
      - traefik

  redis:
#    container_name: symfony-messenger-redis
    image: redis:7-alpine
    restart: unless-stopped
#    ports:
#      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  mailpit:
    image: axllent/mailpit
    #    container_name: symfony-messenger-mailpit
    restart: unless-stopped
    volumes:
      - mailpit_data:/data
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    labels:
      - traefik.enable=true
      - traefik.http.routers.mailpit.rule=Host(`mailpit.symfony-messenger.localhost`)
      - traefik.http.routers.mailpit.entrypoints=web
#      - traefik.http.routers.mailpit.middlewares=mailpit-auth
#      - traefik.http.middlewares.mailpit-auth.basicauth.users=admin:$$2y$$05$$CNGZ3x5LIbcmPnoQoSMKfOmgNbPwgSvtHgkIJyIihp7rgTXjzoJS.
      - traefik.http.services.mailpit.loadbalancer.server.port=8025
      - traefik.docker.network=traefik
    networks:
      - internal
      - traefik

  adminer:
    image: adminer
    #    container_name: symfony-messenger-adminer
    restart: always
    labels:
      - traefik.enable=true
      - traefik.http.routers.adminer.rule=Host(`adminer.symfony-messenger.localhost`)
      - traefik.http.services.adminer.loadbalancer.server.port=8080
      - traefik.docker.network=traefik
    networks:
      - internal
      - traefik

networks:
  internal:
    driver: bridge
  traefik:
    external: true
    name: traefik

volumes:
  database_data:
  redis_data:
  mailpit_data:
